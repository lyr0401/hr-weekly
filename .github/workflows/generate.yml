name: 生成滴滴HR资讯

on:
  schedule:
    # 每2小时触发一次（UTC时间），对应北京时间 8,10,12,14,16,18,20,22,0,2,4,6 点
    - cron: '0 2 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 生成资讯页面
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: 提交并推送
        run: |
          git config user.name "HR Weekly Bot"
          git config user.email "bot@hr-weekly"
          git add docs/
          git diff --staged --quiet || git commit -m "自动更新：$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M') CST"
          git push
